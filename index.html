<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Horizon Hub | 30 Exclusive Rewards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>

      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 80% 10%, #0a0c1a, #02040f);
      font-family: 'Inter', system-ui, sans-serif;
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }

    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .content-area {
      flex: 3;
      min-width: 250px;
    }

    .level-sidebar {
      flex: 0.9;
      min-width: 200px;
      position: sticky;
      top: 2rem;
      align-self: flex-start;
      background: rgba(15, 20, 35, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 1.5rem 1rem;
      border: 1px solid rgba(251, 146, 60, 0.5);
      height: fit-content;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .level-sidebar h3 {
      color: #ffd6a5;
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .level-sidebar h3 i {
      color: #fb923c;
    }

    .triggers-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .level-btn {
      background: linear-gradient(105deg, #1a1e32, #11152a);
      border: 1px solid #fb923c;
      border-radius: 60px;
      padding: 8px 0;
      text-align: center;
      font-weight: 700;
      font-size: 0.75rem;
      color: #ffdead;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .level-btn i {
      font-size: 0.75rem;
      color: #fb923c;
    }

    .level-btn:hover {
      background: linear-gradient(105deg, #2a2f4a, #1a1f38);
      border-color: #f97316;
      transform: translateY(-2px);
    }

    .level-btn.active {
      background: linear-gradient(105deg, #ea580c, #c2410c);
      border-color: #fdba74;
      color: white;
    }

    .level-btn.active i {
      color: #fff0e0;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fb923c, #f97316, #fdba74);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex-wrap: nowrap;
      white-space: nowrap;
      justify-content: center;
    }

    .hero h1 i {
      background: none;
      -webkit-text-fill-color: #fb923c;
      font-size: 2rem;
    }

    @media (max-width: 550px) {
      .hero h1 {
        font-size: 1.4rem;
        gap: 8px;
      }
      .hero h1 i {
        font-size: 1.3rem;
      }
    }
    @media (max-width: 400px) {
      .hero h1 {
        font-size: 1.2rem;
        gap: 6px;
      }
      .hero h1 i {
        font-size: 1.1rem;
      }
    }

    .stats-card {
      background: rgba(10, 14, 30, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 1.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 2rem;
      margin-bottom: 0;
      border: 1px solid rgba(249, 115, 22, 0.4);
    }

    .total-box {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fcd9b6;
      font-weight: 600;
    }

    .total-box i {
      font-size: 2rem;
      color: #fb923c;
    }

    .total-number {
      background: #0a0e20;
      padding: 6px 20px;
      border-radius: 50px;
      font-size: 2rem;
      font-weight: 800;
      color: #fb923c;
      font-family: monospace;
      letter-spacing: 2px;
      border: 1px solid #f97316;
    }

    .legend {
      display: flex;
      gap: 20px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #cbd5e1;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2d3a5e;
    }

    .dot.active {
      background: #10b981;
      box-shadow: 0 0 6px #34d399;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0 1rem 0;
      padding-bottom: 6px;
      border-bottom: 2px solid rgba(249, 115, 22, 0.5);
    }

    .section-title i {
      font-size: 1.5rem;
      color: #fb923c;
    }

    .section-title h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fee3c0;
    }

    .badge {
      background: #f97316;
      padding: 2px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #0a0a1a;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      max-height: 50vh;
      overflow-y: auto;
      padding-right: 8px;
    }

    .btn-grid::-webkit-scrollbar {
      width: 6px;
    }
    .btn-grid::-webkit-scrollbar-track {
      background: #1e253e;
      border-radius: 10px;
    }
    .btn-grid::-webkit-scrollbar-thumb {
      background: #fb923c;
      border-radius: 10px;
    }

    .offer-btn {
      background: linear-gradient(105deg, #13182e, #0c1022);
      border: 1px solid #3b3f66;
      border-radius: 60px;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      text-decoration: none;
      transition: all 0.25s ease;
      color: #e2e8f0;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .offer-btn:hover {
      transform: translateY(-3px);
      background: linear-gradient(105deg, #1c2340, #12172e);
      border-color: #fb923c;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4);
    }

    .offer-btn.disabled {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
      background: linear-gradient(105deg, #1a2a1a, #0f1f0f);
      border-color: #4a6a4a;
      transform: none;
    }

    .btn-left {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }
    .btn-left i {
      font-size: 1.2rem;
      color: #fb923c;
      min-width: 28px;
      text-align: center;
    }
    .btn-left span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .click-count {
      background: #00000055;
      border-radius: 40px;
      padding: 3px 12px;
      font-size: 0.8rem;
      font-weight: 800;
      color: #fdba74;
      border: 0.5px solid #fb923c;
      font-family: monospace;
    }
    .offer-btn.clicked {
      background: linear-gradient(105deg, #0f3b2a, #0a261c);
      border-color: #10b981;
    }
    .offer-btn.clicked .click-count {
      background: #064e3b;
      color: #facc15;
    }

    .reset-btn {
      background: rgba(249, 115, 22, 0.15);
      border: 1px solid #f97316;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #fdba74;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .reset-btn:hover {
      background: #f9731630;
      color: #ffffff;
      border-color: #fb923c;
    }

    footer {
      margin-top: 1.5rem;
      text-align: center;
      color: #6b7280;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 850px) {
      .main-container { flex-direction: column; }
      .level-sidebar { display: none; }
      .mobile-tier-bar {
        display: block;
        background: rgba(15, 20, 35, 0.85);
        backdrop-filter: blur(16px);
        border-radius: 1.5rem;
        padding: 1rem;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(251, 146, 60, 0.5);
      }
      .mobile-tier-bar h3 {
        color: #ffd6a5;
        font-size: 1rem;
        text-align: center;
        margin-bottom: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .mobile-triggers {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .mobile-tier-btn {
        background: linear-gradient(105deg, #1a1e32, #11152a);
        border: 1px solid #fb923c;
        border-radius: 60px;
        padding: 6px 0;
        font-weight: 700;
        font-size: 0.65rem;
        color: #ffdead;
        cursor: pointer;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .mobile-tier-btn i { font-size: 0.65rem; color: #fb923c; }
      .mobile-tier-btn.active {
        background: linear-gradient(105deg, #ea580c, #c2410c);
        border-color: #fdba74;
        color: white;
      }
      .btn-grid { max-height: 45vh; }
      .stats-card { margin-top: 1.5rem; }
    }
    @media (min-width: 851px) {
      .mobile-tier-bar { display: none; }
    }
  </style>
</head>
<body>
<div class="main-container">
  <div class="content-area">
    <div class="hero">
      <h1><i class="fas fa-crown"></i> HORIZON HUB <i class="fas fa-gem"></i></h1>
    </div>

    <div class="mobile-tier-bar" id="mobileTierBar">

  <div class="level-sidebar">
    <h3><i class="fas fa-layer-group"></i> Choose Tier</h3>
    <div class="triggers-grid" id="desktopTriggers"></div>
  </div>
</div>

<script>
  // ==================== 30 NEW LINKS (wistfulseverely.com) ====================
  const ALL_LINKS = [
    "https://wistfulseverely.com/mzg6q16p?key=7901a438c0b4994d07224e07c1589216",
    "https://wistfulseverely.com/g7s0mw0s?key=e6f9931f5828514e2751061f9837673c",
    "https://wistfulseverely.com/b9dss3bmdx?key=ff351ef47106733bcdc016e607781168",
    "https://wistfulseverely.com/vupq7qbg0?key=2042baeb51f2045ea45270043c7f1db9",
    "https://wistfulseverely.com/sksy6u2z?key=dce56bae4c591afd7038aa5cdbfed518",
    "https://wistfulseverely.com/kzzn8k1p?key=416dc2dc5cd802855b68bc2c38dd8e80",
    "https://wistfulseverely.com/v7k2zrzy4t?key=da0a419357cb87fddb7fb0f76bb0682d",

    "https://wistfulseverely.com/ze8zvi0535?key=c868343310c1882d1088af9cecc3aa67",
    "https://wistfulseverely.com/uf89bdtk?key=536c98f942555468b4b0718422d3b0e6",
    "https://wistfulseverely.com/g6ganajjc?key=c41580fa98312d9a500c7c7dea6f7489",
    "https://wistfulseverely.com/r29t80v8pp?key=ba7968425475ac0d30f2f3966585cacc",
    "https://wistfulseverely.com/xs9ywhssz?key=ee5e9e6d0249397683eec7aaa19da814",
    "https://wistfulseverely.com/a6w1cyd5t?key=3154b2e42650dd0213d0d9d826779454",
    "https://wistfulseverely.com/ri84i8r71?key=960393d28895e7b82568bae7f4a6b580",
    "https://wistfulseverely.com/s96z6a9fe4?key=e4a828fe3b218a930a5a66bab529beb3",
    "https://wistfulseverely.com/htztt9wk1?key=d53072c64f11e4be57101ac50620c605",
    "https://wistfulseverely.com/m40979v3?key=3ca54f8807d330a06c471cf8eb8658eb",
    "https://wistfulseverely.com/cjjyn1t7x1?key=625345b7d0de87ec629cac6f45a92095",
    "https://wistfulseverely.com/kf9yajgzc?key=89adb369774c1e8a6491836b18fc0265",
    "https://wistfulseverely.com/wd3tgas2?key=6e39b9414b8b7fdb6f642bb1b780b57e",
    "https://wistfulseverely.com/iyr9t9ka?key=25c3d55ca8a13c7963353f44f861eaa3",
    "https://wistfulseverely.com/j2bcyzk95j?key=4be92c03ec34dd6759d19520fae10e51",
    "https://wistfulseverely.com/vz1c2s1qm?key=d85efcfb6e0955439ae18ae4d455744f",
    "https://wistfulseverely.com/br6w2ah2?key=7c93f2b835110530900f88419f1cae1d",
    "https://wistfulseverely.com/kuav5ffnjt?key=db1bfe15ad4405baa81593780f03c4a8",
    "https://wistfulseverely.com/ndcib8xxa?key=4934577195ec34b2325921163dd48bed",
    "https://wistfulseverely.com/dvh50j1z?key=ba9712040c6a4606aaf19c636be77fcb",
    "https://wistfulseverely.com/ife22ppdwg?key=9604256bbe6a6762c8bac48f52c17218",
    "https://wistfulseverely.com/dnbumhx5?key=58aff25814a57663121afe36630bc492"
  ];

  // ========== UNIQUE USER-FRIENDLY & AD-COMPLIANT OFFER NAMES (30 unique) ==========
  const OFFER_NAMES = [
    "🌟 Horizon Welcome Gift", "🎁 Simple Bonus Pack", "💎 Easy Reward Gem", "⚡ Quick Access Pass", "🍀 Lucky Hub Token",
    "🏆 Friendly Milestone", "🚀 Smooth Boost Voucher", "🎯 Clear Bonus Target", "🔑 Gentle Vault Key", "📀 Basic Digital Pack",
    "🕹️ Casual Gamer Perk", "🎧 Calm Audio Reward", "📱 Light Mobile Bonus", "💡 Bright Daily Deal", "🛡️ Cozy Secure Plus",
    "📚 Warm Insider Pass", "🎨 Kind Creator Kit", "⚙️ Simple Utility Perk", "🔔 Soft Flash Alert", "🌐 Gentle Web Access",
    "🧩 Friendly Mystery Tile", "🎵 Peaceful Sound Pack", "📸 Easy Snapshot", "🕶️ Quiet Stealth Perk", "🌿 Pure Lucky Clover",
    "🧭 Kind Navigator Bonus", "🎲 Simple Dice Reward", "🃏 Gentle Wild Card", "🎈 Soft Celebration Pack", "⭐ Pure Horizon Bonus"
  ];

  // Matching icons for each offer
  const OFFER_ICONS = [
    "star", "gift", "gem", "bolt", "leaf", "trophy", "rocket", "bullseye", "key", "database",
    "gamepad", "headphones", "mobile-alt", "lightbulb", "shield-alt", "book", "palette", "cogs", "bell", "globe",
    "puzzle-piece", "music", "camera", "sunglasses", "leaf", "compass", "dice-d6", "star-of-life", "balloon", "crown"
  ];

  // Shuffle array utility (Fisher-Yates) for unique order per user
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Get persistent shuffled order for this user
  function getShuffledIndices() {
    const ORDER_KEY = "horizonHubShuffledOrderV1";
    const saved = localStorage.getItem(ORDER_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.length === 30) return parsed;
    }
    const indices = Array.from({ length: 30 }, (_, i) => i);
    shuffleArray(indices);
    localStorage.setItem(ORDER_KEY, JSON.stringify(indices));
    return indices;
  }

  const shuffledOrder = getShuffledIndices();

  // Build tier offers using shuffled order (3 per tier)
  const TIER_OFFERS = {};
  for (let tier = 1; tier <= 10; tier++) {
    TIER_OFFERS[tier] = [];
    for (let j = 0; j < 3; j++) {
      const globalIdx = shuffledOrder[(tier - 1) * 3 + j];
      TIER_OFFERS[tier].push({
        name: OFFER_NAMES[globalIdx % OFFER_NAMES.length],
        icon: OFFER_ICONS[globalIdx % OFFER_ICONS.length],
        link: ALL_LINKS[globalIdx],
        originalIndex: globalIdx
      });
    }
  }

  const TOTAL_OFFERS = 30;
  let clickCounts = new Array(TOTAL_OFFERS).fill(0);
  let claimedStatus = new Array(TOTAL_OFFERS).fill(false);
  const STORAGE_KEY = "horizonHubClicksV1";
  const CLAIMED_KEY = "horizonHubClaimedV1";

  function loadCounts() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        let arr = JSON.parse(saved);
        if (arr.length === TOTAL_OFFERS) clickCounts = arr;
      } catch(e) {}
    }
    const savedClaimed = localStorage.getItem(CLAIMED_KEY);
    if (savedClaimed) {
      try {
        let arr = JSON.parse(savedClaimed);
        if (arr.length === TOTAL_OFFERS) claimedStatus = arr;
      } catch(e) {}
    }
  }
  function saveCounts() { 
    localStorage.setItem(STORAGE_KEY, JSON.stringify(clickCounts));
    localStorage.setItem(CLAIMED_KEY, JSON.stringify(claimedStatus));
  }
  function updateTotalDisplay() {
    const total = clickCounts.reduce((a,b)=>a+b,0);
    document.getElementById("totalClicks").innerText = total;
  }

  let currentTier = 1;

  function renderCurrentTier() {
    const grid = document.getElementById("offersGrid");
    grid.innerHTML = "";
    const offers = TIER_OFFERS[currentTier];
    const tierNames = ["Starter Pack", "Bronze Tier", "Silver Tier", "Gold Tier", "Platinum Tier", "Emerald Tier", "Ruby Tier", "Sapphire Tier", "Diamond Tier", "Ultimate Vault"];
    const levelTitle = document.getElementById("levelName");
    const levelBadge = document.getElementById("levelBadge");
    levelTitle.innerText = `Tier ${currentTier} · ${tierNames[currentTier-1]}`;
    levelBadge.innerText = "3 Offers";

    offers.forEach((offer) => {
      const globalIdx = offer.originalIndex;
      const count = clickCounts[globalIdx];
      const isClaimed = claimedStatus[globalIdx];
      const hasClick = count > 0;
      
      const btn = document.createElement("a");
      if (!isClaimed) {
        btn.href = offer.link;
        btn.target = "_blank";
        btn.rel = "noopener noreferrer";
      } else {
        btn.href = "javascript:void(0);";
      }
      btn.className = `offer-btn ${hasClick ? "clicked" : ""} ${isClaimed ? "disabled" : ""}`;
      btn.setAttribute("data-global", globalIdx);
      
      btn.innerHTML = `<div class="btn-left"><i class="fas fa-${offer.icon}"></i><span>${offer.name}</span></div><div class="click-count">${count}</div>`;
      
      if (!isClaimed) {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (claimedStatus[globalIdx]) return false;
          
          // One-time claim: mark claimed and increment
          claimedStatus[globalIdx] = true;
          clickCounts[globalIdx] += 1;
          saveCounts();
          updateTotalDisplay();
          renderCurrentTier();  // re-render to disable this button
          
          // Open link in new tab
          window.open(offer.link, "_blank");
          return false;
        });
      } else {
        btn.style.cursor = "not-allowed";
        btn.onclick = (e) => { e.preventDefault(); return false; };
      }
      
      grid.appendChild(btn);
    });
  }

  function setActiveTier(tier) {
    currentTier = tier;
    document.querySelectorAll(".level-btn").forEach(btn => {
      if (parseInt(btn.getAttribute("data-level")) === tier) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    document.querySelectorAll(".mobile-tier-btn").forEach(btn => {
      if (parseInt(btn.getAttribute("data-level")) === tier) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    renderCurrentTier();
  }

  function resetCounters() {
    for (let i = 0; i < TOTAL_OFFERS; i++) {
      clickCounts[i] = 0;
      claimedStatus[i] = false;
    }
    saveCounts();
    updateTotalDisplay();
    renderCurrentTier();
  }

  function buildTriggers() {
    const desktopContainer = document.getElementById("desktopTriggers");
    const mobileContainer = document.getElementById("mobileTriggers");
    desktopContainer.innerHTML = "";
    mobileContainer.innerHTML = "";
    for (let i = 1; i <= 10; i++) {
      const dBtn = document.createElement("div");
      dBtn.className = "level-btn";
      dBtn.setAttribute("data-level", i);
      dBtn.innerHTML = `<i class="fas fa-tag"></i> ${i}`;
      dBtn.addEventListener("click", () => setActiveTier(i));
      desktopContainer.appendChild(dBtn);
      const mBtn = document.createElement("div");
      mBtn.className = "mobile-tier-btn";
      mBtn.setAttribute("data-level", i);
      mBtn.innerHTML = `<i class="fas fa-tag"></i> ${i}`;
      mBtn.addEventListener("click", () => setActiveTier(i));
      mobileContainer.appendChild(mBtn);
    }
  }

  document.getElementById("resetAllBtn").addEventListener("click", resetCounters);
  loadCounts();
  buildTriggers();
  setActiveTier(1);
  updateTotalDisplay();
</script>
</body>
</html>
